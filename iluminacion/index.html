  <script type="module">
import { createRoot } from "react-dom/client";
import React, { useState, useEffect, useRef, useCallback } from "react";
import * as THREE from "three";
import htm from "htm";

const html = htm.bind(React.createElement);
const STORE = "pavoneo-iluminacion-v6";
const uid = () => Math.random().toString(36).slice(2, 9);
const clamp = (v, a, b) => { v = Number(v); if (!isFinite(v)) v = a; return Math.max(a, Math.min(b, v)); };

/* ── Mesa Stairville DMX-Master I · mapeo MIDI Note On (del manual) ──
   Escenas: nota = (banco−1)×8 + (escena−1)  → bancos 1-15 × escenas 1-8 = notas 0-119
   Chases 1-6 = notas 120-125 · Blackout = nota 126 */
function deskNote(d) {
  if (!d || d.mode === "none") return null;
  if (d.mode === "blackout") return 126;
  if (d.mode === "chase") return 119 + clamp(d.chase, 1, 6);
  return (clamp(d.bank, 1, 15) - 1) * 8 + (clamp(d.scene, 1, 8) - 1);
}
function deskLabel(d) {
  if (!d || d.mode === "none") return "— sin asignar —";
  if (d.mode === "blackout") return "Blackout";
  if (d.mode === "chase") return `Chase ${clamp(d.chase,1,6)}`;
  return `Banco ${clamp(d.bank,1,15)} · Escena ${clamp(d.scene,1,8)}`;
}
/* Escribe un Standard MIDI File (.mid) con las notas de la mesa en el tiempo de cada cue */
function buildSMF(cues, channel, bpmIn) {
  const bpm = clamp(bpmIn || 120, 20, 300), PPQ = 480, ch = clamp(channel, 1, 16) - 1;
  const tick = s => Math.max(0, Math.round(s * (bpm/60) * PPQ));
  const evs = [];
  cues.slice().sort((a,b)=>a.time-b.time).forEach(c => {
    const note = deskNote(c.desk); if (note === null) return;
    evs.push({ t:tick(c.time), on:true, note });
    evs.push({ t:tick(c.time + 0.15), on:false, note });
  });
  if (!evs.length) return null;
  evs.sort((a,b)=> a.t-b.t || (a.on===b.on?0:a.on?1:-1));
  const vlq = n => { const b=[n&127]; while(n>>=7) b.unshift(n&127|128); return b; };
  const bytes = [];
  const name = "Iluminacion Pavoneo 360 - Mesa DMX";
  const nb = Array.from(name).map(c=>c.charCodeAt(0)&127);
  bytes.push(0,255,3,...vlq(nb.length),...nb);
  const usq = Math.round(6e7/bpm);
  bytes.push(0,255,81,3, usq>>16&255, usq>>8&255, usq&255);
  let last = 0;
  evs.forEach(ev => { bytes.push(...vlq(ev.t-last)); last=ev.t; bytes.push((ev.on?144:128)|ch, ev.note, ev.on?127:0); });
  bytes.push(...vlq(0),255,47,0);
  const head = [77,84,104,100,0,0,0,6,0,0,0,1, PPQ>>8&255, PPQ&255];
  const L = bytes.length;
  const trk = [77,84,114,107, L>>>24&255, L>>16&255, L>>8&255, L&255];
  return new Uint8Array([...head,...trk,...bytes]);
}
const fmtTime = s => { s = Math.max(0, s||0); return Math.floor(s/60) + ":" + String(Math.floor(s%60)).padStart(2,"0"); };

/* ─────────────────────────── Paleta Artes Búho ─────────────────────────── */
const C = {
  crema:"#F7F2E5", tinta:"#071C48", azul:"#0757D8", dorado:"#E8B83E",
  bg:"#040A18", panel:"#081226", panel2:"#0C1B38", border:"#173463",
  text:"#F7F2E5", sub:"#9DB2D8", muted:"#6C83Ad"
};

/* ─────────────────────────── Tipos de foco ─────────────────────────── */
const FIXTURE_TYPES = {
  fijo:  { label:"Foco fijo",    icon:"▼", desc:"Recorte fijo apuntando a un punto del suelo." },
  movil: { label:"Foco móvil",   icon:"✳", desc:"Cabeza móvil con barrido pan/tilt automático." },
  suelo: { label:"Foco de suelo", icon:"▲", desc:"PAR/uplight de suelo que ilumina hacia arriba." },
  barra: { label:"Barra LED",    icon:"▬", desc:"Barra wash horizontal para bañar el fondo." },
  tubo:  { label:"Tubo LED",     icon:"▮", desc:"Tubo vertical de acento y glow suave." },
};
const OBJ_SHAPES = {
  caja:     { label:"Armario (caja)",  desc:"Prisma rectangular — armario, mueble, riser." },
  cubo:     { label:"Cubo",            desc:"Bloque cuadrado — cajón, tarima." },
  cilindro: { label:"Cilindro",        desc:"Columna / forma circular en planta." },
};

/* Sala real de las Live Sessions: 5 m (ancho) × 8,3 m (fondo) ≈ 42 m² · techo 2,30 m.
   Sin truss colgado: los focos van sobre totems / truss de pie de ~2 m. */
const ROOM = { W:5, D:8.3, H:2.3 };
const STAND_H = 2.0; // altura por defecto del truss de pie

/* ─────────────────────────── Semilla ─────────────────────────── */
function seed() {
  return {
    fixtures: [
      mkFixture("movil", { name:"Móvil izq",  x:-1.6, y:2.0, z:-2.0, color:"#0757D8", intensity:80, beam:16, panRange:26, tiltRange:15, speed:26, tilt:42, standStyle:"scrim", standColor:"#B98CFF", link:"A" }),
      mkFixture("movil", { name:"Móvil der",  x: 1.6, y:2.0, z:-2.0, color:"#0757D8", intensity:80, beam:16, panRange:26, tiltRange:15, speed:26, tilt:42, standStyle:"scrim", standColor:"#B98CFF", link:"A", mirror:true }),
      mkFixture("fijo",  { name:"Recorte artista", x:0, y:2.0, z:2.2, color:"#FFF6E2", intensity:90, beam:26, tx:0, tz:0.4 }),
      mkFixture("fijo",  { name:"Contra izq", x:-1.6, y:2.0, z:-3.2, color:"#0757D8", intensity:55, beam:30, tx:-0.7, tz:-1.4 }),
      mkFixture("suelo", { name:"Uplight izq", x:-2.2, y:0.12, z:-3.6, color:"#0757D8", intensity:65, beam:26, tilt:8, rotY:0 }),
      mkFixture("suelo", { name:"Uplight der", x: 2.2, y:0.12, z:-3.6, color:"#0757D8", intensity:65, beam:26, tilt:8, rotY:0 }),
      mkFixture("barra", { name:"Barra fondo", x:0, y:0.14, z:-3.95, color:"#0757D8", intensity:70, length:4, rotY:0 }),
      mkFixture("tubo",  { name:"Tubo izq", x:-2.3, y:1.0, z:-3.98, color:"#E8B83E", intensity:75, length:2.0 }),
      mkFixture("tubo",  { name:"Tubo der", x: 2.3, y:1.0, z:-3.98, color:"#E8B83E", intensity:75, length:2.0 }),
    ],
    objects: [
      mkObject("caja", { name:"Armario", x:-1.7, z:-2.6, w:1.0, h:2.0, d:0.55, color:"#5A4632" }),
    ],
    settings: { ambient:0.14, floorColor:"#141b28", wallColor:"#0d1420", showBeams:true, blackout:false, playing:true, shadows:"alta", fog:true },
    cues: [],
    midi: { channel: 1, offset: 0, bpm: 120, sig: 4 },
    selected: null,
  };
}
function mkFixture(type, o={}) {
  return {
    id: uid(), type, name: o.name || FIXTURE_TYPES[type].label,
    x: o.x ?? 0, y: o.y ?? (type==="barra"?0.14:type==="suelo"?0.12:type==="tubo"?1.0:STAND_H), z: o.z ?? -2,
    color: o.color || "#FFFFFF", intensity: o.intensity ?? 75,
    beam: o.beam ?? (type==="suelo"?24:18),      // fijo / movil / suelo
    tx: o.tx ?? 0, tz: o.tz ?? 0, // aim fijo
    tilt: o.tilt ?? (type==="suelo"?12:35), panRange: o.panRange ?? 30, tiltRange: o.tiltRange ?? 18,
    speed: o.speed ?? 28, phase: o.phase ?? 0,   // movil
    length: o.length ?? (type==="tubo"?2.0:4), rotY: o.rotY ?? 0, // barra / tubo / orientación suelo
    standStyle: o.standStyle ?? "truss", standColor: o.standColor ?? "#B98CFF", standGlow: o.standGlow ?? 70, // totem
    link: o.link ?? "", mirror: o.mirror ?? false, // enlace de focos / movimiento en espejo
  };
}
function mkObject(shape, o={}) {
  return {
    id: uid(), shape, name: o.name || OBJ_SHAPES[shape].label,
    x: o.x ?? 0, z: o.z ?? 0,
    w: o.w ?? 1.2, h: o.h ?? 2, d: o.d ?? 1.2, r: o.r ?? 0.8,
    rotY: o.rotY ?? 0, color: o.color || "#6b5842",
  };
}

/* ─────────────────────────── Motor 3D ─────────────────────────── */
function createEngine(mount, getState, onPick) {
  const scene = new THREE.Scene();
  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  mount.appendChild(renderer.domElement);

  const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 200);

  /* órbita */
  const orbit = { theta: 0, phi: 1.08, radius: 8.5, target: new THREE.Vector3(0, 0.95, 0.2) };
  function updateCam() {
    orbit.phi = Math.max(0.15, Math.min(1.52, orbit.phi));
    orbit.radius = Math.max(3.5, Math.min(24, orbit.radius));
    const st = Math.sin(orbit.phi), ct = Math.cos(orbit.phi);
    camera.position.set(
      orbit.target.x + orbit.radius * st * Math.sin(orbit.theta),
      orbit.target.y + orbit.radius * ct,
      orbit.target.z + orbit.radius * st * Math.cos(orbit.theta)
    );
    camera.lookAt(orbit.target);
  }

  /* iluminación base */
  const ambient = new THREE.AmbientLight(0xffffff, 0.14);
  scene.add(ambient);
  const fill = new THREE.DirectionalLight(0x9db2d8, 0.12);
  fill.position.set(6, 10, 8);
  scene.add(fill);

  /* sala */
  const matFloor = new THREE.MeshStandardMaterial({ color:0x141b28, roughness:0.95, metalness:0.05 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.W, ROOM.D), matFloor);
  floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; floor.name = "__floor";
  scene.add(floor);
  const grid = new THREE.GridHelper(ROOM.D, Math.round(ROOM.D), 0x24406e, 0x142a4d);
  grid.scale.x = ROOM.W / ROOM.D;   // cubre justo el suelo rectangular
  grid.position.y = 0.012; scene.add(grid);

  const matWall = new THREE.MeshStandardMaterial({ color:0x0d1420, roughness:1, metalness:0 });
  const back = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.W, ROOM.H), matWall);
  back.position.set(0, ROOM.H/2, -ROOM.D/2); back.receiveShadow = true; scene.add(back);
  const wallL = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.D, ROOM.H), matWall.clone());
  wallL.rotation.y = Math.PI/2; wallL.position.set(-ROOM.W/2, ROOM.H/2, 0); wallL.receiveShadow = true; scene.add(wallL);
  const wallR = new THREE.Mesh(new THREE.PlaneGeometry(ROOM.D, ROOM.H), matWall.clone());
  wallR.rotation.y = -Math.PI/2; wallR.position.set(ROOM.W/2, ROOM.H/2, 0); wallR.receiveShadow = true; scene.add(wallR);

  /* sin truss colgado: los focos elevados llevan su propio totem de pie (ver buildStand) */

  /* piso "escenario" sutil */
  const stageDisc = new THREE.Mesh(
    new THREE.CircleGeometry(1.5, 40),
    new THREE.MeshStandardMaterial({ color:0x1a2740, roughness:0.85, transparent:true, opacity:0.6 })
  );
  stageDisc.rotation.x = -Math.PI/2; stageDisc.position.set(0, 0.014, 0.3); scene.add(stageDisc);

  /* selección */
  const selHelper = new THREE.BoxHelper(new THREE.Mesh(new THREE.BoxGeometry(0.01,0.01,0.01)), 0xE8B83E);
  selHelper.visible = false; scene.add(selHelper);

  /* mapas */
  const fmap = new Map();  // id -> rig
  const omap = new Map();  // id -> mesh
  const scratchCol = new THREE.Color();
  const DOWN = new THREE.Vector3(0, -1, 0);
  const beamGeo = new THREE.ConeGeometry(1, 1, 24, 1, true); beamGeo.translate(0, -0.5, 0);
  const housingMat = new THREE.MeshStandardMaterial({ color:0x1a2233, metalness:0.5, roughness:0.5 });
  const standMat = new THREE.MeshStandardMaterial({ color:0x20293a, metalness:0.55, roughness:0.5 });

  /* totem / truss de pie de altura unitaria (se escala a la altura del foco) */
  function buildStand() {
    const g = new THREE.Group();
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.03, 0.42), standMat);
    base.position.y = 0.015; base.castShadow = true; base.receiveShadow = true;
    g.add(base);
    const meshes = [base];
    [[-0.09,-0.09],[0.09,-0.09],[-0.09,0.09],[0.09,0.09]].forEach(([x,z]) => {
      const v = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1, 6), standMat);
      v.position.set(x, 0.5, z); v.castShadow = true; g.add(v); meshes.push(v);
    });
    [0.34, 0.68].forEach(y => {
      const ring = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.02, 0.24), standMat);
      ring.position.y = y; g.add(ring);
    });
    const top = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.04, 0.28), standMat);
    top.position.y = 1; top.castShadow = true; g.add(top); meshes.push(top);
    // funda scrim luminosa (oculta salvo que el totem sea de estilo "scrim")
    const scrim = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3),
      new THREE.MeshStandardMaterial({ color:0x0d0f14, emissive:0x000000, transparent:true, opacity:0.9, roughness:1, metalness:0 }));
    scrim.position.y = 0.5; scrim.visible = false; g.add(scrim);
    const glow = new THREE.PointLight(0xffffff, 0, 3.2, 2); glow.position.y = 0.55; g.add(glow);
    return { g, meshes, scrim, glow };
  }

  let shadowBudget = 8;

  function shadowsQuality(){ const s = getState().settings.shadows; return s === "off" ? 0 : s === "media" ? 512 : 1024; }

  /* ── crear rig por tipo ── */
  function buildFixture(fx) {
    const group = new THREE.Group();
    scene.add(group);
    const rig = { id: fx.id, type: fx.type, group, meshes: [] };

    if (fx.type === "fijo" || fx.type === "movil" || fx.type === "suelo") {
      const yoke = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.13, 0.34, 14), housingMat);
      body.rotation.x = Math.PI/2; body.castShadow = true;
      const lens = new THREE.Mesh(new THREE.CircleGeometry(0.09, 16), new THREE.MeshBasicMaterial({ color:0x222222 }));
      lens.position.z = 0.18;
      yoke.add(body, lens);
      const bracket = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.02, 8, 16, Math.PI), housingMat);
      bracket.rotation.x = Math.PI/2;
      group.add(yoke, bracket);
      const spot = new THREE.SpotLight(0xffffff, 0, 60, 0.4, 0.35, 1);
      spot.target = new THREE.Object3D(); scene.add(spot.target);
      group.add(spot);
      const beamMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0, depthWrite:false, side:THREE.DoubleSide, blending:THREE.AdditiveBlending });
      const beam = new THREE.Mesh(beamGeo, beamMat); beam.renderOrder = 2;
      scene.add(beam);
      rig.yoke = yoke; rig.lens = lens; rig.spot = spot; rig.beam = beam; rig.beamMat = beamMat;
      rig.meshes.push(body, lens);
      if (fx.type !== "suelo") {
        const st = buildStand(); scene.add(st.g); rig.stand = st.g; rig.scrim = st.scrim; rig.standGlow = st.glow;
        st.meshes.forEach(m => rig.meshes.push(m));
      } else {
        const can = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.19, 0.12, 16), housingMat);
        can.position.y = -0.06; can.castShadow = true; can.receiveShadow = true; group.add(can); rig.meshes.push(can);
      }
    }
    else if (fx.type === "barra") {
      const bar = new THREE.Mesh(new THREE.BoxGeometry(fx.length, 0.16, 0.16),
        new THREE.MeshStandardMaterial({ color:0x0a0f18, emissive:0x000000, roughness:0.4 }));
      bar.castShadow = true;
      group.add(bar);
      const cells = [];
      const n = Math.max(4, Math.round(fx.length * 1.6));
      for (let i=0;i<n;i++){
        const cell = new THREE.Mesh(new THREE.PlaneGeometry(fx.length/n*0.8, 0.1),
          new THREE.MeshBasicMaterial({ color:0x111111 }));
        cell.position.set(-fx.length/2 + (i+0.5)*fx.length/n, 0, 0.085);
        group.add(cell); cells.push(cell);
      }
      const spot = new THREE.SpotLight(0xffffff, 0, 30, 0.9, 0.9, 1);
      spot.position.set(0, 0.2, 0);
      spot.target = new THREE.Object3D(); scene.add(spot.target);
      group.add(spot);
      const beamMat = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0, depthWrite:false, side:THREE.DoubleSide, blending:THREE.AdditiveBlending });
      const beam = new THREE.Mesh(beamGeo, beamMat);
      scene.add(beam);
      rig.bar = bar; rig.cells = cells; rig.spot = spot; rig.beam = beam; rig.beamMat = beamMat; rig.barLen = fx.length;
      rig.meshes.push(bar);
    }
    else if (fx.type === "tubo") {
      const tube = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, fx.length, 12),
        new THREE.MeshStandardMaterial({ color:0x0a0f18, emissive:0x000000, roughness:0.35 }));
      const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.06, 12), housingMat);
      cap.position.y = fx.length/2;
      group.add(tube, cap);
      const pl = new THREE.PointLight(0xffffff, 0, 9, 2);
      group.add(pl);
      rig.tube = tube; rig.point = pl; rig.tubeLen = fx.length;
      rig.meshes.push(tube);
    }
    rig.meshes.forEach(m => { m.userData.pickId = fx.id; m.userData.pickKind = "fixture"; });
    fmap.set(fx.id, rig);
    return rig;
  }

  function disposeRig(rig) {
    scene.remove(rig.group);
    if (rig.beam) scene.remove(rig.beam);
    if (rig.spot && rig.spot.target) scene.remove(rig.spot.target);
    if (rig.stand) { scene.remove(rig.stand); rig.stand.traverse(o => { o.geometry?.dispose?.(); }); }
    rig.group.traverse(o => { if (o.geometry) o.geometry.dispose?.(); if (o.material) o.material.dispose?.(); });
  }

  /* ── reconcile focos: crea/borra/geo ── */
  function syncFixtures(fixtures) {
    const ids = new Set(fixtures.map(f => f.id));
    for (const [id, rig] of fmap) if (!ids.has(id)) { disposeRig(rig); fmap.delete(id); }
    fixtures.forEach(fx => {
      let rig = fmap.get(fx.id);
      // reconstruir si cambió tipo o longitud de barra/tubo (geometría)
      if (rig && (rig.type !== fx.type || (fx.type==="barra" && rig.barLen!==fx.length) || (fx.type==="tubo" && rig.tubeLen!==fx.length))) {
        disposeRig(rig); fmap.delete(fx.id); rig = null;
      }
      if (!rig) buildFixture(fx);
    });
    // presupuesto de sombras: sólo fijo/móvil, primeros N
    let used = 0;
    const q = shadowsQuality();
    fixtures.forEach(fx => {
      const rig = fmap.get(fx.id); if (!rig || !rig.spot) return;
      const wants = q>0 && (fx.type==="fijo"||fx.type==="movil"||(fx.type==="barra"&&q>=1024)) && used < shadowBudget;
      rig.spot.castShadow = !!wants;
      if (wants) { rig.spot.shadow.mapSize.set(q, q); rig.spot.shadow.bias = -0.0006; rig.spot.shadow.camera.near = 0.4; rig.spot.shadow.camera.far = 60; used++; }
    });
  }

  /* ── reconcile objetos ── */
  function objGeo(o) {
    if (o.shape === "cilindro") return new THREE.CylinderGeometry(o.r, o.r, o.h, 32);
    if (o.shape === "cubo")     { const s = o.w; return new THREE.BoxGeometry(s, s, s); }
    return new THREE.BoxGeometry(o.w, o.h, o.d);
  }
  function syncObjects(objects) {
    const ids = new Set(objects.map(o => o.id));
    for (const [id, mesh] of omap) if (!ids.has(id)) { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); omap.delete(id); }
    objects.forEach(o => {
      let mesh = omap.get(o.id);
      const sig = `${o.shape}|${o.w}|${o.h}|${o.d}|${o.r}`;
      if (mesh && mesh.userData.sig !== sig) { scene.remove(mesh); mesh.geometry.dispose(); omap.delete(o.id); mesh = null; }
      if (!mesh) {
        mesh = new THREE.Mesh(objGeo(o), new THREE.MeshStandardMaterial({ color:o.color, roughness:0.85, metalness:0.05 }));
        mesh.castShadow = true; mesh.receiveShadow = true;
        mesh.userData = { sig, pickId:o.id, pickKind:"object" };
        scene.add(mesh); omap.set(o.id, mesh);
      }
      const hh = (o.shape==="cubo"? o.w : o.h)/2;
      mesh.position.set(o.x, hh, o.z);
      mesh.rotation.y = (o.rotY||0) * Math.PI/180;
      mesh.material.color.set(o.color);
    });
  }

  /* ── frame ── */
  function applyFrame() {
    const state = getState();
    if (!state) return;
    const { fixtures, settings, selected } = state;
    const now = performance.now()/1000;
    const black = settings.blackout;
    ambient.intensity = black ? 0.03 : settings.ambient;
    fill.intensity = black ? 0.02 : 0.12;
    scene.fog = settings.fog ? new THREE.Fog(0x040a18, 5, 20) : null;
    matFloor.color.set(settings.floorColor);
    [back, wallL, wallR].forEach(w => w.material.color.set(settings.wallColor));

    fixtures.forEach(fx => {
      const rig = fmap.get(fx.id); if (!rig) return;
      rig.group.position.set(fx.x, fx.y, fx.z);
      const k = black ? 0 : fx.intensity/100;
      scratchCol.set(fx.color);

      if (rig.type === "fijo" || rig.type === "movil" || rig.type === "suelo") {
        const from = new THREE.Vector3(fx.x, fx.y, fx.z);
        const to = new THREE.Vector3();
        if (rig.type === "movil") {
          const swing = Math.sin(now * fx.speed/60) * (fx.panRange*Math.PI/180) * (fx.mirror ? -1 : 1);
          const pan = (fx.phase*Math.PI/180) + swing;
          const tilt = (fx.tilt*Math.PI/180) + Math.sin(now * fx.speed/60 * 0.7 + fx.phase*Math.PI/180) * (fx.tiltRange*Math.PI/180);
          const hor = Math.sin(Math.max(0.02, tilt));
          const dist = fx.y / Math.max(0.15, Math.cos(tilt));
          to.set(
            Math.max(-ROOM.W/2, Math.min(ROOM.W/2, fx.x + Math.sin(pan)*hor*dist)),
            0,
            Math.max(-ROOM.D/2, Math.min(ROOM.D/2, fx.z - Math.cos(pan)*hor*dist))
          );
        } else if (rig.type === "suelo") {
          const tilt = clamp(fx.tilt, 0, 80) * Math.PI/180;   // 0 = recto hacia arriba
          const rot = ((fx.rotY||0) + (fx.mirror ? 180 : 0)) * Math.PI/180;
          const dx = Math.sin(tilt)*Math.sin(rot), dy = Math.cos(tilt), dz = -Math.sin(tilt)*Math.cos(rot);
          const reach = dy > 0.08 ? Math.min(7, (ROOM.H + 0.6 - fx.y)/dy) : 6;
          to.set(fx.x + dx*reach, fx.y + dy*reach, fx.z + dz*reach);
        } else { // fijo
          to.set(Math.max(-ROOM.W/2, Math.min(ROOM.W/2, fx.tx)), 0, Math.max(-ROOM.D/2, Math.min(ROOM.D/2, fx.tz)));
        }
        rig.spot.target.position.copy(to);
        rig.spot.position.set(0,0,0);
        rig.spot.color.copy(scratchCol);
        rig.spot.intensity = k * 3.2;
        rig.spot.angle = Math.max(0.05, Math.min(1.1, (fx.beam*Math.PI/180)/2));
        rig.spot.penumbra = 0.35;
        rig.yoke.lookAt(to.x, to.y, to.z);
        rig.lens.material.color.copy(scratchCol).multiplyScalar(0.15 + 0.85*k);
        const dir = to.clone().sub(from); const len = dir.length(); dir.normalize();
        rig.beam.position.copy(from);
        rig.beam.quaternion.setFromUnitVectors(DOWN, dir);
        const R = Math.tan(rig.spot.angle) * len;
        rig.beam.scale.set(R, len, R);
        rig.beamMat.color.copy(scratchCol);
        rig.beamMat.opacity = settings.showBeams ? k*0.14 : 0;
        if (rig.stand) {
          rig.stand.visible = fx.y > 0.55;
          rig.stand.position.set(fx.x, 0, fx.z);
          rig.stand.scale.y = Math.max(0.2, fx.y - 0.12);
          const isScrim = fx.standStyle === "scrim";
          const gk = black ? 0 : (fx.standGlow ?? 70)/100;
          rig.scrim.visible = isScrim;
          if (isScrim) {
            const sc = new THREE.Color(fx.standColor || "#B98CFF");
            rig.scrim.material.emissive.copy(sc).multiplyScalar(gk);
            rig.standGlow.color.copy(sc);
            rig.standGlow.intensity = gk * 1.3;
          } else {
            rig.standGlow.intensity = 0;
          }
        }
      }
      else if (rig.type === "barra") {
        rig.group.rotation.y = (fx.rotY||0)*Math.PI/180;
        rig.cells.forEach(c => c.material.color.copy(scratchCol).multiplyScalar(0.1 + 0.9*k));
        rig.bar.material.emissive.copy(scratchCol).multiplyScalar(k);
        rig.spot.color.copy(scratchCol);
        rig.spot.intensity = k * 2.0;
        rig.spot.target.position.set(fx.x, 0, fx.z - 0.1);
        rig.beam.position.set(fx.x, fx.y, fx.z);
        rig.beam.quaternion.setFromUnitVectors(DOWN, DOWN);
        rig.beam.scale.set(fx.length*0.4, fx.y+0.2, 0.7);
        rig.beamMat.color.copy(scratchCol);
        rig.beamMat.opacity = settings.showBeams ? k*0.06 : 0;
      }
      else if (rig.type === "tubo") {
        rig.group.rotation.z = (fx.rotY||0)*Math.PI/180;
        rig.tube.material.emissive.copy(scratchCol).multiplyScalar(k);
        rig.point.color.copy(scratchCol);
        rig.point.intensity = k * 1.4;
      }
    });

    // selección
    let selMesh = null;
    if (selected) {
      const rig = fmap.get(selected);
      if (rig) selMesh = rig.meshes[0] || rig.group;
      else if (omap.get(selected)) selMesh = omap.get(selected);
    }
    if (selMesh) { selHelper.visible = true; selHelper.setFromObject(selMesh); }
    else selHelper.visible = false;
  }

  /* ── interacción: órbita + arrastre ── */
  const ray = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  const floorPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
  let mode = null; // 'orbit' | 'drag'
  let dragId = null, dragKind = null, last = {x:0,y:0};

  function setNdc(e){
    const r = renderer.domElement.getBoundingClientRect();
    ndc.x = ((e.clientX - r.left)/r.width)*2 - 1;
    ndc.y = -((e.clientY - r.top)/r.height)*2 + 1;
  }
  function pickAt(e){
    setNdc(e); ray.setFromCamera(ndc, camera);
    const targets = [];
    fmap.forEach(rig => rig.meshes.forEach(m => targets.push(m)));
    omap.forEach(m => targets.push(m));
    const hit = ray.intersectObjects(targets, false)[0];
    return hit ? { id: hit.object.userData.pickId, kind: hit.object.userData.pickKind } : null;
  }
  function onDown(e){
    e.preventDefault();
    last = { x:e.clientX, y:e.clientY };
    const hit = pickAt(e);
    if (hit && !e.shiftKey) {
      onPick(hit.id);
      dragId = hit.id; dragKind = hit.kind; mode = "drag";
    } else {
      onPick(hit ? hit.id : null);
      mode = "orbit";
    }
  }
  function onMove(e){
    if (!mode) return;
    if (mode === "orbit") {
      const dx = e.clientX - last.x, dy = e.clientY - last.y;
      orbit.theta -= dx*0.006; orbit.phi -= dy*0.006; updateCam();
    } else if (mode === "drag" && dragId) {
      setNdc(e); ray.setFromCamera(ndc, camera);
      const p = new THREE.Vector3();
      if (ray.ray.intersectPlane(floorPlane, p)) {
        p.x = Math.max(-ROOM.W/2+0.3, Math.min(ROOM.W/2-0.3, p.x));
        p.z = Math.max(-ROOM.D/2+0.3, Math.min(ROOM.D/2-0.3, p.z));
        onDrag(dragId, dragKind, p.x, p.z);
      }
    }
    last = { x:e.clientX, y:e.clientY };
  }
  function onUp(){ mode = null; dragId = null; dragKind = null; }
  function onWheel(e){ e.preventDefault(); orbit.radius *= (1 + Math.sign(e.deltaY)*0.08); updateCam(); }

  let onDrag = () => {};

  const el = renderer.domElement;
  el.style.touchAction = "none";
  el.addEventListener("pointerdown", onDown);
  window.addEventListener("pointermove", onMove);
  window.addEventListener("pointerup", onUp);
  el.addEventListener("wheel", onWheel, { passive:false });

  /* ── loop + resize ── */
  let raf = 0, alive = true;
  function loop(){ if (!alive) return; applyFrame(); updateCam(); renderer.render(scene, camera); raf = requestAnimationFrame(loop); }
  function resize(){
    const w = mount.clientWidth || 800, h = mount.clientHeight || 500;
    renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  const ro = new ResizeObserver(resize); ro.observe(mount);
  resize(); updateCam(); loop();

  return {
    syncFixtures, syncObjects,
    setOnDrag(fn){ onDrag = fn; },
    frame(theta){ orbit.theta = theta; updateCam(); },
    resetView(){ orbit.theta = 0; orbit.phi = 1.08; orbit.radius = 8.5; orbit.target.set(0, 0.95, 0.2); updateCam(); },
    dispose(){ alive = false; cancelAnimationFrame(raf); ro.disconnect();
      el.removeEventListener("pointerdown", onDown); window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp); el.removeEventListener("wheel", onWheel);
      renderer.dispose(); mount.removeChild(el); }
  };
}

/* ─────────────────────────── Viewport React ─────────────────────────── */
function Viewport({ stateRef, onPick, onDrag, engineRef }) {
  const mountRef = useRef(null);
  useEffect(() => {
    const eng = createEngine(mountRef.current, () => stateRef.current, onPick);
    eng.setOnDrag(onDrag);
    engineRef.current = eng;
    return () => { eng.dispose(); engineRef.current = null; };
  }, []);
  return html`<div ref=${mountRef} style=${{ position:"absolute", inset:0 }} />`;
}

/* ─────────────────────────── Controles UI ─────────────────────────── */
function Field({ label, children, hint }) {
  return html`<label style=${{ display:"block", marginBottom:10 }}>
    <div style=${{ fontSize:11, letterSpacing:".05em", textTransform:"uppercase", color:C.sub, marginBottom:4 }}>${label}</div>
    ${children}
    ${hint && html`<div style=${{ fontSize:10, color:C.muted, marginTop:3 }}>${hint}</div>`}
  </label>`;
}
function Slider({ label, value, min, max, step=1, onChange, unit="" }) {
  return html`<div style=${{ marginBottom:10 }}>
    <div style=${{ display:"flex", justifyContent:"space-between", fontSize:11, textTransform:"uppercase", letterSpacing:".05em", color:C.sub, marginBottom:4 }}>
      <span>${label}</span><span style=${{ color:C.dorado }}>${value}${unit}</span>
    </div>
    <input type="range" min=${min} max=${max} step=${step} value=${value}
      onInput=${e => onChange(parseFloat(e.target.value))} style=${{ width:"100%" }} />
  </div>`;
}
function TextInput({ value, onChange }) {
  return html`<input value=${value} onInput=${e => onChange(e.target.value)}
    style=${{ width:"100%", background:C.panel2, border:`1px solid ${C.border}`, color:C.text,
      borderRadius:8, padding:"7px 9px", fontSize:13 }} />`;
}
function ColorInput({ value, onChange }) {
  return html`<div style=${{ display:"flex", gap:8, alignItems:"center" }}>
    <input type="color" value=${value} onInput=${e => onChange(e.target.value)}
      style=${{ width:38, height:32, border:`1px solid ${C.border}`, borderRadius:8, background:"transparent", cursor:"pointer", padding:0 }} />
    <span style=${{ fontSize:12, color:C.sub, fontFamily:"monospace" }}>${value.toUpperCase()}</span>
  </div>`;
}
function Btn({ children, onClick, primary, danger, small, active }) {
  const bg = primary ? C.dorado : danger ? "#4a1420" : active ? C.azul : C.panel2;
  const col = primary ? C.tinta : danger ? "#ff9db0" : C.text;
  return html`<button onClick=${onClick} style=${{
    background:bg, color:col, border:`1px solid ${primary?C.dorado:active?C.azul:C.border}`,
    borderRadius:8, padding: small?"5px 9px":"8px 12px", fontSize: small?12:13, fontWeight:600,
    cursor:"pointer", whiteSpace:"nowrap" }}>${children}</button>`;
}

    <${Field} label="Nombre"><${TextInput} value=${fx.name} onChange=${v=>patch({name:v})} /><//>

    <${Slider} label="Intensidad" value=${fx.intensity} min=0 max=100 unit="%" onChange=${v=>patch({intensity:v})} />

    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:8 }}>Posición en la sala</div>

    <${Slider} label="Fondo · Frente (Z)" value=${round(fx.z)} min=${-4.1} max=4.1 step=0.05 unit=" m" onChange=${v=>patch({z:v})} />

    <div style=${{ height:1, background:C.border, margin:"12px 0" }} />
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:8 }}>Enlace de focos</div>
    <div style=${{ display:"flex", gap:6, marginBottom:8 }}>
      ${linkBtn("","Sin")} ${linkBtn("A","A")} ${linkBtn("B","B")} ${linkBtn("C","C")}
    </div>
    ${fx.link && html`<div style=${{ fontSize:10, color:C.muted, marginBottom:8 }}>Los focos del mismo enlace comparten movimiento y apertura (no el color ni la posición).</div>`}
    ${canMirror && html`<label style=${{ display:"flex", alignItems:"center", gap:8, cursor:"pointer" }}>
      <input type="checkbox" checked=${!!fx.mirror} onChange=${e=>patch({mirror:e.target.checked})} style=${{ width:16, height:16, accentColor:C.dorado }} />
      <span style=${{ fontSize:12.5, color:C.text }}>Invertido (espejo) — movimiento simétrico al centro</span>
    </label>`}

    ${hasBeam && html`<div>
      <div style=${{ height:1, background:C.border, margin:"12px 0" }} />
      ${hasTotem && html`<div>
        <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:8 }}>Totem de pie</div>
        <div style=${{ display:"flex", gap:6, marginBottom:10 }}>
          ${[["truss","Truss"],["scrim","Scrim luminoso"]].map(([v,l]) => html`<button key=${v}
            onClick=${()=>patch({standStyle:v})} style=${{ flex:1, padding:"7px", borderRadius:7, cursor:"pointer",
              background: (fx.standStyle||"truss")===v?C.azul:C.panel2, color:(fx.standStyle||"truss")===v?C.crema:C.sub,
              border:`1px solid ${(fx.standStyle||"truss")===v?C.azul:C.border}`, fontSize:12, fontWeight:600 }}>${l}</button>`)}
        </div>
        ${fx.standStyle==="scrim" && html`<div>
          <${Field} label="Color del scrim"><${ColorInput} value=${fx.standColor||"#B98CFF"} onChange=${v=>patch({standColor:v})} /><//>
          <${Slider} label="Brillo del totem" value=${fx.standGlow ?? 70} min=0 max=100 unit="%" onChange=${v=>patch({standGlow:v})} />
        </div>`}
        <div style=${{ height:1, background:C.border, margin:"12px 0" }} />
      </div>`}
      <${Slider} label="Apertura del haz" value=${fx.beam} min=6 max=60 unit="°" onChange=${v=>patch({beam:v})} />
      ${fx.type==="fijo" && html`<div>
        <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, margin:"10px 0 8px" }}>Apuntado (punto del suelo)</div>
        <${Slider} label="Objetivo X" value=${round(fx.tx)} min=${-2.5} max=2.5 step=0.05 unit=" m" onChange=${v=>patch({tx:v})} />
        <${Slider} label="Objetivo Z" value=${round(fx.tz)} min=${-4.1} max=4.1 step=0.05 unit=" m" onChange=${v=>patch({tz:v})} />
      </div>`}
      ${fx.type==="suelo" && html`<div>
        <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, margin:"10px 0 8px" }}>Apuntado (uplight)</div>
        <${Slider} label="Inclinación · 0 = recto arriba" value=${fx.tilt} min=0 max=80 unit="°" onChange=${v=>patch({tilt:v})} />
        <${Slider} label="Orientación" value=${fx.rotY} min=0 max=360 unit="°" onChange=${v=>patch({rotY:v})} />
      </div>`}
      ${fx.type==="movil" && html`<div>
        <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, margin:"10px 0 8px" }}>Movimiento automático</div>
        <${Slider} label="Inclinación base" value=${fx.tilt} min=5 max=70 unit="°" onChange=${v=>patch({tilt:v})} />
        <${Slider} label="Barrido horizontal" value=${fx.panRange} min=0 max=80 unit="°" onChange=${v=>patch({panRange:v})} />
        <${Slider} label="Barrido vertical" value=${fx.tiltRange} min=0 max=45 unit="°" onChange=${v=>patch({tiltRange:v})} />
        <${Slider} label="Velocidad" value=${fx.speed} min=2 max=90 onChange=${v=>patch({speed:v})} />
        <${Slider} label="Desfase" value=${fx.phase} min=0 max=360 unit="°" onChange=${v=>patch({phase:v})} />
      </div>`}
    </div>`}

    ${(fx.type==="barra"||fx.type==="tubo") && html`<div>
      <div style=${{ height:1, background:C.border, margin:"12px 0" }} />
      <${Slider} label="Longitud" value=${round(fx.length)} min=0.6 max=5 step=0.1 unit=" m" onChange=${v=>patch({length:v})} />
      <${Slider} label="Rotación" value=${fx.rotY} min=0 max=90 unit="°" onChange=${v=>patch({rotY:v})} />
    </div>`}

    <div style=${{ display:"flex", gap:8, marginTop:16 }}>
      <${Btn} small onClick=${dup}>⧉ Duplicar<//>
      <${Btn} small danger onClick=${remove}>🗑 Eliminar<//>
    </div>
  </div>`;
}

const round = n => Math.round(n*10)/10;

/* ─────────────────────────── Timeline + MIDI (mesa DMX) ─────────────────────────── */
/* Input numérico que permite escribir libremente y solo ajusta el rango al salir del campo
   (evita que el clamp por tecla impida teclear valores como 130 cuando el mínimo es 20). */
function NumInput({ value, min, max, onCommit, width=52 }) {
  const [draft, setDraft] = useState(String(value));
  useEffect(() => { setDraft(String(value)); }, [value]);
  const commit = () => { const n = clamp(draft === "" || draft === "-" ? min : draft, min, max); onCommit(n); setDraft(String(n)); };
  return html`<input value=${draft} inputMode="numeric"
    onInput=${e => { const t = e.target.value; setDraft(t); const n = Number(t); if (t !== "" && isFinite(n) && n >= min && n <= max) onCommit(n); }}
    onBlur=${commit}
    onKeyDown=${e => { if (e.key === "Enter") e.target.blur(); }}
    style=${{ width, textAlign:"center", background:C.panel2, border:`1px solid ${C.border}`, color:C.text, borderRadius:7, padding:"5px", fontSize:13 }} />`;
}
function DeskEditor({ cue, upCue, del, captureInto, testFire, channel, barInfo }) {
  const d = cue.desk || { mode:"none" };
  const num = (val, min, max, onCh) => html`<input value=${val} inputMode="numeric"
    onInput=${e=>onCh(clamp(e.target.value, min, max))} style=${{ width:52, textAlign:"center",
      background:C.panel2, border:`1px solid ${C.border}`, color:C.text, borderRadius:7, padding:"6px 4px", fontSize:13 }} />`;
  const note = deskNote(d);
  return html`<div style=${{ display:"flex", flexWrap:"wrap", alignItems:"flex-end", gap:12 }}>
    <label style=${{ display:"block" }}>
      <div style=${{ fontSize:10.5, textTransform:"uppercase", letterSpacing:".05em", color:C.sub, marginBottom:4 }}>Nombre del cambio</div>
      <input value=${cue.name} onInput=${e=>upCue({name:e.target.value})} style=${{ width:150, background:C.panel2, border:`1px solid ${C.border}`, color:C.text, borderRadius:7, padding:"6px 9px", fontSize:13 }} />
    </label>
    <label style=${{ display:"block" }}>
      <div style=${{ fontSize:10.5, textTransform:"uppercase", letterSpacing:".05em", color:C.sub, marginBottom:4 }}>Tiempo (s)</div>
      ${num(cue.time, 0, 99999, v=>upCue({time:v}))}
    </label>
    <label style=${{ display:"block" }}>
      <div style=${{ fontSize:10.5, textTransform:"uppercase", letterSpacing:".05em", color:C.sub, marginBottom:4 }}>Acción en la mesa</div>
      <select value=${d.mode} onChange=${e=>upCue({desk:{...d, mode:e.target.value}})} style=${{ background:C.panel2, border:`1px solid ${C.border}`, color:C.text, borderRadius:7, padding:"6px 9px", fontSize:13 }}>
        <option value="scene">Escena de banco</option>
        <option value="chase">Chase</option>
        <option value="blackout">Blackout</option>
        <option value="none">Ninguna</option>
      </select>
    </label>
    ${d.mode==="scene" && html`<div style=${{ display:"flex", gap:10 }}>
      <label><div style=${{ fontSize:10.5, textTransform:"uppercase", color:C.sub, marginBottom:4 }}>Banco (1-15)</div>${num(d.bank||1,1,15,v=>upCue({desk:{...d,bank:v}}))}</label>
      <label><div style=${{ fontSize:10.5, textTransform:"uppercase", color:C.sub, marginBottom:4 }}>Escena (1-8)</div>${num(d.scene||1,1,8,v=>upCue({desk:{...d,scene:v}}))}</label>
    </div>`}
    ${d.mode==="chase" && html`<label><div style=${{ fontSize:10.5, textTransform:"uppercase", color:C.sub, marginBottom:4 }}>Chase (1-6)</div>${num(d.chase||1,1,6,v=>upCue({desk:{...d,chase:v}}))}</label>`}
    <div style=${{ fontSize:12, color:C.text, background:C.panel2, border:`1px solid ${C.border}`, borderRadius:7, padding:"6px 10px" }}>
      ${note===null ? "Sin nota" : html`Nota MIDI <b style=${{color:C.dorado}}>${note}</b> · canal ${channel}`}
    </div>
    ${barInfo && html`<div style=${{ fontSize:12, color:C.sub, background:C.panel2, border:`1px solid ${C.border}`, borderRadius:7, padding:"6px 10px" }}>🎵 ${barInfo}</div>`}
    <button onClick=${testFire} title="Envía la nota MIDI a la mesa ahora, sin reproducir la canción (para comprobar el patcheo de bancos/escenas)" style=${{
      background: deskNote(d)===null?C.panel2:"#0e3a1e", color: deskNote(d)===null?C.muted:"#8ef0b3",
      border:`1px solid ${deskNote(d)===null?C.border:"#1c6b39"}`, borderRadius:7, padding:"7px 11px", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>▶ Probar disparo</button>
    <button onClick=${captureInto} title="Guardar el aspecto actual del 3D en este cue" style=${{
      background: cue.look?C.azul:C.panel2, color: cue.look?C.crema:C.text, border:`1px solid ${cue.look?C.azul:C.border}`,
      borderRadius:7, padding:"7px 11px", fontSize:12.5, fontWeight:600, cursor:"pointer" }}>
      ${cue.look? "◉ Look capturado" : "◎ Capturar look 3D"}</button>
    <button onClick=${del} style=${{ background:"#4a1420", color:"#ff9db0", border:"1px solid #4a1420", borderRadius:7, padding:"7px 11px", fontSize:12.5, fontWeight:600, cursor:"pointer" }}>🗑 Borrar</button>
  </div>`;
}

function TimelineDock({ cues, setCues, midi, setMidi, captureLook, applyLook }) {
  const [open, setOpen] = useState(true);
  const [songName, setSongName] = useState("");
  const [playing, setPlaying] = useState(false);
  const [dur, setDur] = useState(0);
  const [cur, setCur] = useState(0);
  const [selId, setSelId] = useState(null);
  const [outputs, setOutputs] = useState([]);
  const [outId, setOutId] = useState("");
  const [status, setStatus] = useState("init");
  const [activeId, setActiveId] = useState(null);
  const [drag, setDrag] = useState(null);
  const audioRef = useRef(null);
  const rafRef = useRef(0);
  const lastRef = useRef(0);
  const headRef = useRef(null);
  const trackRef = useRef(null);
  const cuesRef = useRef(cues); cuesRef.current = cues;
  const outRef = useRef({ outputs:[], outId:"", channel:1 });
  outRef.current = { outputs, outId, channel: midi.channel, offset: midi.offset || 0 };
  const offSec = () => (outRef.current.offset || 0) / 1000;

  useEffect(() => {
    if (!navigator.requestMIDIAccess) { setStatus("unsupported"); return; }
    navigator.requestMIDIAccess({ sysex:false }).then(acc => {
      setStatus("ready");
      const upd = () => { const outs = [...acc.outputs.values()]; setOutputs(outs); setOutId(id => id || (outs[0] ? outs[0].id : "")); };
      acc.onstatechange = upd; upd();
    }).catch(() => setStatus("denied"));
  }, []);

  const sendDesk = desk => {
    const note = deskNote(desk); if (note === null) return;
    const { outputs:outs, outId:oid, channel } = outRef.current;
    const out = outs.find(o => o.id === oid); if (!out) return;
    const ch = clamp(channel, 1, 16) - 1;
    try { out.send([0x90|ch, note, 127]); setTimeout(() => { try { out.send([0x80|ch, note, 0]); } catch {} }, 150); } catch {}
  };

  const fire = (t0, t1) => {
    if (t1 < t0) return;
    cuesRef.current.forEach(c => { if (c.time > t0 && c.time <= t1) { if (c.look) applyLook(c.look); sendDesk(c.desk); setActiveId(c.id); } });
  };

  useEffect(() => {
    if (!playing) { cancelAnimationFrame(rafRef.current); return; }
    const loop = () => {
      const a = audioRef.current;
      if (a) {
        const now = a.currentTime;
        const t1 = now + offSec();          // compensación de latencia: anticipa el disparo
        fire(lastRef.current, t1); lastRef.current = t1;
        if (headRef.current && dur > 0) headRef.current.style.left = (now/dur*100) + "%";
        if (a.ended) { setPlaying(false); return; }
      }
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    const clk = setInterval(() => { if (audioRef.current) setCur(audioRef.current.currentTime); }, 250);
    return () => { cancelAnimationFrame(rafRef.current); clearInterval(clk); };
  }, [playing, dur]);

  const onFile = e => { const f = e.target.files[0]; if (!f) return; const a = audioRef.current; a.src = URL.createObjectURL(f); setSongName(f.name); a.load(); e.target.value = ""; };
  const play = () => { const a = audioRef.current; if (!a || !a.src) return; lastRef.current = a.currentTime + offSec(); a.play(); setPlaying(true); };
  const pause = () => { audioRef.current && audioRef.current.pause(); setPlaying(false); };
  const stop = () => { const a = audioRef.current; if (a) { a.pause(); a.currentTime = 0; } lastRef.current = 0; setCur(0); setPlaying(false); if (headRef.current) headRef.current.style.left = "0%"; };
  const seekTo = tt => { const a = audioRef.current; if (!a) return; tt = Math.max(0, Math.min(dur||tt, tt)); a.currentTime = tt; lastRef.current = tt + offSec(); setCur(tt); if (headRef.current && dur>0) headRef.current.style.left = (tt/dur*100)+"%"; };

  const addCueAt = tt => {
    const c = { id:uid(), time:Math.max(0, Math.round(tt*100)/100), name:"Cambio "+(cues.length+1),
      desk:{ mode:"scene", bank:1, scene:Math.min(8, cues.length+1) }, look:null };
    setCues([...cues, c].sort((a,b)=>a.time-b.time)); setSelId(c.id);
  };
  const onTrackClick = e => {
    if (!dur) { addCueAt(cur); return; }
    const r = trackRef.current.getBoundingClientRect();
    addCueAt(((e.clientX - r.left)/r.width) * dur);
  };
  const upCue = (id, p) => setCues(cues.map(c => c.id===id ? { ...c, ...p } : c).sort((a,b)=>a.time-b.time));
  const delCue = id => { setCues(cues.filter(c => c.id!==id)); if (selId===id) setSelId(null); };
  const exportMid = () => {
    const off = (midi.offset||0)/1000;
    const shifted = cues.map(c => ({ ...c, time: Math.max(0, c.time - off) }));
    const u8 = buildSMF(shifted, midi.channel, midi.bpm);
    if (!u8) { alert("Asigna una escena, chase o blackout a algún cue antes de exportar el .mid."); return; }
    const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([u8], { type:"audio/midi" }));
    a.download = "iluminacion-pavoneo-mesa-dmx.mid"; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
  };

  const sel = cues.find(c => c.id === selId);
  const bpmV = clamp(midi.bpm || 120, 20, 300);
  const sigV = clamp(midi.sig || 4, 1, 12);
  const barSec = 60 / bpmV * sigV;
  let barInfo = "";
  if (sel) {
    const idx = cues.findIndex(c => c.id === sel.id);
    const next = cues[idx+1];
    const endT = next ? next.time : (dur || sel.time);
    barInfo = `Compás ${Math.floor(sel.time/barSec)+1} · ${Math.max(0,(endT-sel.time)/barSec).toFixed(1)} compases` + (next ? "" : " (hasta el final)");
  }
  const statusTxt = { init:"Iniciando MIDI…", ready:"MIDI listo", unsupported:"Web MIDI solo en Chrome/Edge", denied:"Permiso MIDI denegado" }[status];
  const ctrlBtn = (label, onClick, active) => html`<button onClick=${onClick} style=${{
    background: active?C.dorado:C.panel2, color: active?C.tinta:C.text, border:`1px solid ${active?C.dorado:C.border}`,
    borderRadius:8, padding:"7px 11px", fontSize:14, fontWeight:700, cursor:"pointer", minWidth:40 }}>${label}</button>`;

  if (!open) {
    return html`<div style=${{ background:C.panel, borderTop:`1px solid ${C.border}`, padding:"6px 16px", display:"flex", alignItems:"center", gap:10 }}>
      <button onClick=${()=>setOpen(true)} style=${{ background:C.panel2, color:C.dorado, border:`1px solid ${C.border}`, borderRadius:8, padding:"5px 12px", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>▴ Timeline · Directo</button>
      <span style=${{ fontSize:11.5, color:C.sub }}>${cues.length} cambios · ${songName||"sin canción"}</span>
    </div>`;
  }

  return html`<div style=${{ background:C.panel, borderTop:`1px solid ${C.border}`, padding:"10px 16px 12px", display:"flex", flexDirection:"column", gap:9 }}>
    <audio ref=${audioRef} onLoadedMetadata=${e=>setDur(e.target.duration||0)} onEnded=${()=>setPlaying(false)} style=${{ display:"none" }} />
    <!-- fila transporte + midi -->
    <div style=${{ display:"flex", alignItems:"center", gap:9, flexWrap:"wrap" }}>
      <button onClick=${()=>setOpen(false)} title="Contraer" style=${{ background:"transparent", color:C.sub, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 9px", cursor:"pointer", fontSize:12 }}>▾</button>
      <span class="ff-serif" style=${{ fontSize:15, color:C.dorado, fontWeight:700 }}>Timeline · Directo</span>
      ${ctrlBtn(playing?"⏸":"▶", playing?pause:play, playing)}
      ${ctrlBtn("⏹", stop)}
      <label style=${{ background:C.panel2, border:`1px solid ${C.border}`, borderRadius:8, padding:"7px 11px", fontSize:12.5, fontWeight:600, cursor:"pointer", color:C.text }}>
        ⭱ Subir canción<input type="file" accept="audio/*" onChange=${onFile} style=${{ display:"none" }} />
      </label>
      <span style=${{ fontSize:12.5, color:C.sub, minWidth:96, fontVariantNumeric:"tabular-nums" }}>${fmtTime(cur)} / ${fmtTime(dur)}</span>
      <span style=${{ fontSize:12, color:C.muted, maxWidth:150, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>${songName}</span>

      <label style=${{ display:"flex", alignItems:"center", gap:6, fontSize:11.5, color:C.sub }} title="Tempo de la canción — dibuja los compases en la barra">BPM
        <${NumInput} value=${midi.bpm||120} min=${20} max=${300} width=${52} onCommit=${v=>setMidi({ bpm:v })} /></label>
      <label style=${{ display:"flex", alignItems:"center", gap:6, fontSize:11.5, color:C.sub }} title="Tiempos por compás (numerador del compás, p. ej. 4 para 4/4)">Compás
        <${NumInput} value=${midi.sig||4} min=${1} max=${12} width=${40} onCommit=${v=>setMidi({ sig:v })} />/4</label>

      <div style=${{ marginLeft:"auto", display:"flex", alignItems:"center", gap:9, flexWrap:"wrap" }}>
        <label style=${{ display:"flex", alignItems:"center", gap:6, fontSize:11.5, color:C.sub }}>Canal MIDI
          <${NumInput} value=${midi.channel} min=${1} max=${16} width=${46} onCommit=${v=>setMidi({ channel:v })} /></label>
        <label style=${{ display:"flex", alignItems:"center", gap:6, fontSize:11.5, color:C.sub }} title="Adelanta el disparo MIDI para compensar el retardo del sistema (mesa/interfaz). Positivo = dispara antes.">Compensación
          <${NumInput} value=${midi.offset||0} min=${-1000} max=${1000} width=${56} onCommit=${v=>setMidi({ offset:v })} />ms</label>
        <label style=${{ display:"flex", alignItems:"center", gap:6, fontSize:11.5, color:C.sub }}>Salida
          <select value=${outId} onChange=${e=>setOutId(e.target.value)} style=${{ maxWidth:160, background:C.panel2, border:`1px solid ${C.border}`, color:C.text, borderRadius:7, padding:"5px 7px", fontSize:12 }}>
            ${outputs.length===0 && html`<option value="">(sin salidas MIDI)</option>`}
            ${outputs.map(o=>html`<option key=${o.id} value=${o.id}>${o.name}</option>`)}
          </select></label>
        <span style=${{ fontSize:11, color: status==="ready"?"#6fe0a6":C.muted, border:`1px solid ${C.border}`, borderRadius:20, padding:"3px 9px" }}>● ${statusTxt}</span>
        <button onClick=${exportMid} style=${{ background:C.dorado, color:C.tinta, border:`1px solid ${C.dorado}`, borderRadius:8, padding:"7px 11px", fontSize:12.5, fontWeight:700, cursor:"pointer" }}>⭳ Exportar .mid</button>
      </div>
    </div>

    <!-- pista -->
    <div style=${{ fontSize:10.5, color:C.muted }}>Click en la barra para añadir un cambio · click en un marcador para editarlo · arrastra el marcador para moverlo en el tiempo</div>
    <div ref=${trackRef} onClick=${onTrackClick} style=${{ position:"relative", height:44, background:C.panel2, border:`1px solid ${C.border}`, borderRadius:8, cursor:"copy", overflow:"hidden" }}>
      ${dur>0 ? (()=>{ const total=Math.floor(dur/barSec); const step= total>72?4:1; const out=[];
        for(let i=1;i<=total;i++){ if(i%step) continue; const phrase=i%(step*4)===0; const lp=i*barSec/dur*100;
          out.push(html`<div key=${'b'+i} style=${{ position:"absolute", left:lp+"%", top:0, bottom:0, width:1, background: phrase?"rgba(232,184,62,.28)":"rgba(255,255,255,.07)" }} />`);
          if(phrase) out.push(html`<span key=${'n'+i} style=${{ position:"absolute", left:lp+"%", bottom:1, transform:"translateX(2px)", fontSize:9, color:C.muted, pointerEvents:"none" }}>${i}</span>`);
        } return out; })()
        : [0.25,0.5,0.75].map(f=>html`<div key=${f} style=${{ position:"absolute", left:(f*100)+"%", top:0, bottom:0, width:1, background:"rgba(255,255,255,.06)" }} />`)}
      ${cues.map(c=>{ const shown = (drag && drag.id===c.id) ? drag.time : c.time; const left = dur>0 ? (shown/dur*100) : 0; const on = activeId===c.id; const isSel = selId===c.id;
        return html`<div key=${c.id}
          onClick=${e=>e.stopPropagation()}
          onPointerDown=${e=>{ e.stopPropagation(); setSelId(c.id); seekTo(c.time); if (dur>0) { setDrag({ id:c.id, time:c.time }); e.currentTarget.setPointerCapture(e.pointerId); } }}
          onPointerMove=${e=>{ if (!drag || drag.id!==c.id || dur<=0) return; const r=trackRef.current.getBoundingClientRect(); const tt=Math.max(0, Math.min(dur, ((e.clientX-r.left)/r.width)*dur)); setDrag({ id:c.id, time:Math.round(tt*100)/100 }); }}
          onPointerUp=${e=>{ if (drag && drag.id===c.id) { upCue(c.id, { time:drag.time }); setDrag(null); } }}
          title=${c.name+" · "+deskLabel(c.desk)}
          style=${{ position:"absolute", left:left+"%", top:0, bottom:0, transform:"translateX(-50%)", width:10,
            display:"flex", justifyContent:"center", cursor: dur>0?"ew-resize":"pointer", touchAction:"none", background:"transparent", border:"none", padding:0 }}>
          <div style=${{ width:isSel?4:3, height:"100%", background: on?C.dorado:isSel?C.azul:"#4f6ea8" }} />
          <span style=${{ position:"absolute", top:2, left:8, whiteSpace:"nowrap", fontSize:10, color:isSel?C.crema:C.sub, background:"rgba(4,10,24,.7)", padding:"1px 4px", borderRadius:4, pointerEvents:"none" }}>${c.look?"◉ ":""}${deskLabel(c.desk).replace("Banco ","B").replace(" · Escena ",".").replace("Escena","E")}</span>
        </div>`; })}
      <div ref=${headRef} style=${{ position:"absolute", left:"0%", top:0, bottom:0, width:2, background:C.dorado, pointerEvents:"none", boxShadow:"0 0 6px "+C.dorado }} />
    </div>

    <!-- editor de cue seleccionado -->
    ${sel ? html`<div style=${{ background:C.panel2, border:`1px solid ${C.border}`, borderRadius:8, padding:"10px 12px" }}>
      <${DeskEditor} cue=${sel} channel=${midi.channel} barInfo=${barInfo}
        upCue=${p=>upCue(sel.id,p)} del=${()=>delCue(sel.id)} captureInto=${()=>upCue(sel.id,{look:captureLook()})}
        testFire=${()=>{ sendDesk(sel.desk); if (sel.look) applyLook(sel.look); setActiveId(sel.id); setTimeout(()=>setActiveId(null), 450); }} />
    </div>` : html`<div style=${{ fontSize:12, color:C.muted, padding:"2px 0" }}>
      Sube la canción, dale a ▶ y ve añadiendo cambios sobre la barra. En cada uno eliges qué escena/chase de la mesa Stairville dispara (calcula la nota MIDI sola) y puedes capturar el look del 3D para previsualizarlo. Exporta el .mid para tu DAW o envíalo en vivo por la salida MIDI.
    </div>`}
  </div>`;
}

/* ─────────────────────────── App ─────────────────────────── */
function App() {
  const [state, setState] = useState(null);
  const [panel, setPanel] = useState("focos"); // focos | objetos | escena
  const stateRef = useRef(null);
  const engineRef = useRef(null);
  const saveTimer = useRef(null);

  // cargar
  useEffect(() => {
    let data = null;
    try { const raw = window.storage.get(STORE); if (raw) data = JSON.parse(raw); } catch {}
    const s = data && data.fixtures ? { ...seed(), ...data, selected:null } : seed();
    setState(s);
  }, []);

  // el motor lee siempre el estado más reciente
  stateRef.current = state;

  // sincronizar motor + guardar
  useEffect(() => {
    if (!state) return;
    if (engineRef.current) {
      engineRef.current.syncFixtures(state.fixtures);
      engineRef.current.syncObjects(state.objects);
    }
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      try { window.storage.set(STORE, JSON.stringify({ ...state, selected:null })); } catch {}
    }, 500);
  }, [state]);

  const up = useCallback(patch => setState(s => ({ ...s, ...patch })), []);
  const LINK_SHARE = ["color","tilt","panRange","tiltRange","speed","phase","beam"]; // se copia a los focos enlazados
  const patchFixture = (id, p) => setState(s => {
    const f0 = s.fixtures.find(x => x.id===id);
    const grp = f0 && f0.link;
    const shared = {}; LINK_SHARE.forEach(k => { if (k in p) shared[k] = p[k]; });
    const hasShared = grp && Object.keys(shared).length > 0;
    return { ...s, fixtures: s.fixtures.map(f =>
      f.id===id ? { ...f, ...p } : (hasShared && f.link===grp ? { ...f, ...shared } : f)) };
  });
  const patchObject  = (id, p) => setState(s => ({ ...s, objects:  s.objects.map(o => o.id===id ? { ...o, ...p } : o) }));
  const patchSetting = p => setState(s => ({ ...s, settings: { ...s.settings, ...p } }));
  const setCues = useCallback(cs => setState(s => ({ ...s, cues: cs })), []);
  const setMidi = useCallback(p => setState(s => ({ ...s, midi: { ...s.midi, ...p } })), []);
  const captureLook = useCallback(() => {
    const s = stateRef.current;
    return { fixtures: JSON.parse(JSON.stringify(s.fixtures)),
      settings: { ambient:s.settings.ambient, blackout:s.settings.blackout, showBeams:s.settings.showBeams, fog:s.settings.fog } };
  }, []);
  const applyLook = useCallback(look => {
    if (!look) return;
    setState(s => ({ ...s,
      fixtures: look.fixtures ? JSON.parse(JSON.stringify(look.fixtures)) : s.fixtures,
      settings: { ...s.settings, ...(look.settings||{}) } }));
  }, []);

  const onPick = useCallback(id => setState(s => ({ ...s, selected:id })), []);
  const onDrag = useCallback((id, kind, x, z) => {
    setState(s => kind==="fixture"
      ? { ...s, fixtures: s.fixtures.map(f => f.id===id ? { ...f, x, z } : f) }
      : { ...s, objects:  s.objects.map(o => o.id===id ? { ...o, x, z } : o) });
  }, []);

  if (!state) return null;
  const sel = state.selected;
  const selFixture = state.fixtures.find(f => f.id===sel);
  const selObject  = state.objects.find(o => o.id===sel);

  const addFixture = type => {
    const f = mkFixture(type, { name: `${FIXTURE_TYPES[type].label} ${state.fixtures.filter(x=>x.type===type).length+1}` });
    setState(s => ({ ...s, fixtures:[...s.fixtures, f], selected:f.id }));
    setPanel("focos");
  };
  const addObject = shape => {
    const o = mkObject(shape, { name: `${OBJ_SHAPES[shape].label}` });
    setState(s => ({ ...s, objects:[...s.objects, o], selected:o.id }));
    setPanel("objetos");
  };
  const removeFixture = id => setState(s => ({ ...s, fixtures: s.fixtures.filter(f=>f.id!==id), selected:null }));
  const removeObject  = id => setState(s => ({ ...s, objects:  s.objects.filter(o=>o.id!==id), selected:null }));
  const dupFixture = f => { const n = mkFixture(f.type, { ...f, name:f.name+" copia", x:f.x+0.6 }); n.id=uid(); setState(s=>({...s, fixtures:[...s.fixtures,n], selected:n.id})); };
  const dupObject  = o => { const n = mkObject(o.shape, { ...o, name:o.name+" copia", x:o.x+0.6 }); n.id=uid(); setState(s=>({...s, objects:[...s.objects,n], selected:n.id})); };

  const exportJson = () => {
    const blob = new Blob([JSON.stringify({ ...state, selected:null }, null, 2)], { type:"application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "iluminacion-pavoneo.json"; a.click(); URL.revokeObjectURL(a.href);
  };
  const importJson = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => { try { const d = JSON.parse(r.result); if (d.fixtures) setState({ ...seed(), ...d, selected:null }); } catch {} };
    r.readAsText(file); e.target.value = "";
  };
  const resetAll = () => { if (confirm("¿Restablecer la sala a la escena de ejemplo?")) setState(seed()); };

  const st = state.settings;

  return html`<div style=${{ height:"100%", display:"flex", flexDirection:"column", background:C.bg }}>
    <${Header} state=${state} patchSetting=${patchSetting} />
    <div style=${{ flex:1, display:"flex", minHeight:0 }}>
      <!-- Visor -->
      <div style=${{ flex:1, position:"relative", minWidth:0 }}>
        <${Viewport} stateRef=${stateRef} onPick=${onPick} onDrag=${onDrag} engineRef=${engineRef} />
        <${Toolbar} st=${st} patchSetting=${patchSetting} engineRef=${engineRef} />
        <div style=${{ position:"absolute", left:14, bottom:12, fontSize:11, color:C.muted, background:"rgba(4,10,24,.6)", padding:"5px 9px", borderRadius:7, pointerEvents:"none" }}>
          Arrastra un elemento para moverlo · arrastra el fondo para orbitar · rueda para zoom
        </div>
      </div>
      <!-- Panel -->
      <div style=${{ width:340, minWidth:340, background:C.panel, borderLeft:`1px solid ${C.border}`, display:"flex", flexDirection:"column" }}>
        <div style=${{ display:"flex", borderBottom:`1px solid ${C.border}` }}>
          ${[["focos","Focos"],["objetos","Objetos 3D"],["escena","Escena"]].map(([id,lb]) =>
            html`<button key=${id} onClick=${()=>setPanel(id)} style=${{
              flex:1, padding:"11px 6px", background: panel===id?C.panel2:"transparent", color: panel===id?C.dorado:C.sub,
              border:"none", borderBottom: panel===id?`2px solid ${C.dorado}`:"2px solid transparent",
              fontSize:12.5, fontWeight:700, cursor:"pointer", textTransform:"uppercase", letterSpacing:".04em" }}>${lb}</button>`)}
        </div>
        <div style=${{ flex:1, overflowY:"auto", padding:16 }}>
          ${panel==="focos" && html`<${FocosPanel}
            state=${state} sel=${sel} selFixture=${selFixture}
            addFixture=${addFixture} onPick=${onPick}
            patch=${p=>patchFixture(sel,p)} remove=${()=>removeFixture(sel)} dup=${()=>dupFixture(selFixture)} />`}
          ${panel==="objetos" && html`<${ObjetosPanel}
            state=${state} sel=${sel} selObject=${selObject}
            addObject=${addObject} onPick=${onPick}
            patch=${p=>patchObject(sel,p)} remove=${()=>removeObject(sel)} dup=${()=>dupObject(selObject)} />`}
          ${panel==="escena" && html`<${EscenaPanel}
            st=${st} patchSetting=${patchSetting}
            exportJson=${exportJson} importJson=${importJson} resetAll=${resetAll} />`}
        </div>
      </div>
    </div>
    <${TimelineDock} cues=${state.cues||[]} setCues=${setCues} midi=${state.midi||{channel:1}} setMidi=${setMidi}
      captureLook=${captureLook} applyLook=${applyLook} />
  </div>`;
}

function Header({ state, patchSetting }) {
  const st = state.settings;
  return html`<header style=${{ display:"flex", alignItems:"center", gap:14, padding:"10px 18px",
    background:C.panel, borderBottom:`1px solid ${C.border}`, flexWrap:"wrap" }}>
    <div style=${{ display:"flex", alignItems:"baseline", gap:9 }}>
      <span class="ff-serif" style=${{ fontSize:22, color:C.crema, fontWeight:700 }}>Iluminación</span>
      <span class="ff-serif" style=${{ fontSize:22, color:C.dorado, fontWeight:700 }}>Pavoneo 360º</span>
    </div>
    <span style=${{ fontSize:11.5, color:C.sub }}>Live Sessions · Artes Búho · Sala ${ROOM.W} × ${ROOM.D} m · techo ${ROOM.H} m (${Math.round(ROOM.W*ROOM.D)} m²)</span>
    <div style=${{ marginLeft:"auto", display:"flex", gap:8, alignItems:"center" }}>
      <${Btn} small active=${st.playing} onClick=${()=>patchSetting({playing:!st.playing})}>${st.playing?"⏸ Movimiento":"▶ Movimiento"}<//>
      <${Btn} small danger=${st.blackout} onClick=${()=>patchSetting({blackout:!st.blackout})}>${st.blackout?"● Blackout":"○ Blackout"}<//>
    </div>
  </header>`;
}

function Toolbar({ st, patchSetting, engineRef }) {
  const item = (on, label, onClick) => html`<button onClick=${onClick} style=${{
    background: on?C.azul:"rgba(8,18,38,.85)", color: on?C.crema:C.sub, border:`1px solid ${on?C.azul:C.border}`,
    borderRadius:8, padding:"6px 10px", fontSize:12, fontWeight:600, cursor:"pointer" }}>${label}</button>`;
  return html`<div style=${{ position:"absolute", top:12, left:14, display:"flex", gap:8, flexWrap:"wrap" }}>
    ${item(st.showBeams, "Haces", ()=>patchSetting({showBeams:!st.showBeams}))}
    ${item(st.fog, "Niebla", ()=>patchSetting({fog:!st.fog}))}
    ${item(false, "↺ Vista", ()=>engineRef.current?.resetView())}
  </div>`;
}

/* ── Panel focos ── */
function FocosPanel({ state, sel, selFixture, addFixture, onPick, patch, remove, dup }) {
  return html`<div>
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.sub, marginBottom:8 }}>Añadir foco</div>
    <div style=${{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
      ${Object.entries(FIXTURE_TYPES).map(([type,info]) => html`<button key=${type} onClick=${()=>addFixture(type)}
        title=${info.desc} style=${{ background:C.panel2, border:`1px solid ${C.border}`, borderRadius:9,
          padding:"10px 8px", color:C.text, cursor:"pointer", textAlign:"left" }}>
        <div style=${{ fontSize:18, color:C.dorado, lineHeight:1 }}>${info.icon}</div>
        <div style=${{ fontSize:12.5, fontWeight:600, marginTop:4 }}>${info.label}</div>
      </button>`)}
    </div>
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.sub, marginBottom:8 }}>
      Rig actual · ${state.fixtures.length} focos
    </div>
    <div style=${{ display:"flex", flexDirection:"column", gap:5, marginBottom:16 }}>
      ${state.fixtures.map(f => html`<button key=${f.id} onClick=${()=>onPick(f.id)} style=${{
        display:"flex", alignItems:"center", gap:9, padding:"8px 10px", borderRadius:8, cursor:"pointer", textAlign:"left",
        background: sel===f.id?C.azul:C.panel2, border:`1px solid ${sel===f.id?C.azul:C.border}`, color:C.text }}>
        <span style=${{ width:12, height:12, borderRadius:3, background:f.color, flexShrink:0, border:"1px solid rgba(255,255,255,.2)" }}></span>
        <span style=${{ fontSize:15, color:C.dorado }}>${FIXTURE_TYPES[f.type].icon}</span>
        <span style=${{ fontSize:13, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>${f.name}</span>
        <span style=${{ fontSize:10.5, color:C.muted }}>${f.intensity}%</span>
      </button>`)}
    </div>
    ${selFixture ? html`<div style=${{ borderTop:`1px solid ${C.border}`, paddingTop:14 }}>
      <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:12 }}>
        Editar · ${FIXTURE_TYPES[selFixture.type].label}
      </div>
      <${FixtureEditor} fx=${selFixture} patch=${patch} remove=${remove} dup=${dup} />
    </div>` : html`<div style=${{ fontSize:12, color:C.muted, textAlign:"center", padding:"10px 0" }}>Selecciona un foco para editarlo.</div>`}
  </div>`;
}

/* ── Panel objetos ── */
function ObjetosPanel({ state, sel, selObject, addObject, onPick, patch, remove, dup }) {
  return html`<div>
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.sub, marginBottom:8 }}>Añadir objeto de escenografía</div>
    <div style=${{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
      ${Object.entries(OBJ_SHAPES).map(([shape,info]) => html`<button key=${shape} onClick=${()=>addObject(shape)}
        style=${{ background:C.panel2, border:`1px solid ${C.border}`, borderRadius:9, padding:"10px 12px",
          color:C.text, cursor:"pointer", textAlign:"left" }}>
        <div style=${{ fontSize:13, fontWeight:600 }}>＋ ${info.label}</div>
        <div style=${{ fontSize:10.5, color:C.muted, marginTop:2 }}>${info.desc}</div>
      </button>`)}
    </div>
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.sub, marginBottom:8 }}>
      Objetos · ${state.objects.length}
    </div>
    <div style=${{ display:"flex", flexDirection:"column", gap:5, marginBottom:16 }}>
      ${state.objects.length===0 && html`<div style=${{ fontSize:12, color:C.muted }}>Aún no hay objetos.</div>`}
      ${state.objects.map(o => html`<button key=${o.id} onClick=${()=>onPick(o.id)} style=${{
        display:"flex", alignItems:"center", gap:9, padding:"8px 10px", borderRadius:8, cursor:"pointer", textAlign:"left",
        background: sel===o.id?C.azul:C.panel2, border:`1px solid ${sel===o.id?C.azul:C.border}`, color:C.text }}>
        <span style=${{ width:12, height:12, borderRadius:3, background:o.color, flexShrink:0, border:"1px solid rgba(255,255,255,.2)" }}></span>
        <span style=${{ fontSize:13, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>${o.name}</span>
        <span style=${{ fontSize:10.5, color:C.muted }}>${OBJ_SHAPES[o.shape].label.split(" ")[0]}</span>
      </button>`)}
    </div>
    ${selObject ? html`<div style=${{ borderTop:`1px solid ${C.border}`, paddingTop:14 }}>
      <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:12 }}>Editar objeto</div>
      <${ObjectEditor} o=${selObject} patch=${patch} remove=${remove} dup=${dup} />
    </div>` : html`<div style=${{ fontSize:12, color:C.muted, textAlign:"center", padding:"10px 0" }}>Selecciona un objeto para editarlo.</div>`}
  </div>`;
}

/* ── Panel escena ── */
function EscenaPanel({ st, patchSetting, exportJson, importJson, resetAll }) {
  return html`<div>
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:10 }}>Ambiente de sala</div>
    <${Slider} label="Luz ambiente" value=${Math.round(st.ambient*100)} min=0 max=60 unit="%" onChange=${v=>patchSetting({ambient:v/100})} />
    <${Field} label="Color del suelo"><${ColorInput} value=${st.floorColor} onChange=${v=>patchSetting({floorColor:v})} /><//>
    <${Field} label="Color de paredes"><${ColorInput} value=${st.wallColor} onChange=${v=>patchSetting({wallColor:v})} /><//>

    <div style=${{ height:1, background:C.border, margin:"14px 0" }} />
    <${Field} label="Calidad de sombras" hint="Más calidad = sombras más nítidas, algo más de carga.">
      <div style=${{ display:"flex", gap:6 }}>
        ${[["alta","Alta"],["media","Media"],["off","Sin"]].map(([v,l]) => html`<button key=${v}
          onClick=${()=>patchSetting({shadows:v})} style=${{ flex:1, padding:"7px", borderRadius:7, cursor:"pointer",
            background: st.shadows===v?C.azul:C.panel2, color: st.shadows===v?C.crema:C.sub,
            border:`1px solid ${st.shadows===v?C.azul:C.border}`, fontSize:12, fontWeight:600 }}>${l}</button>`)}
      </div>
    <//>

    <div style=${{ height:1, background:C.border, margin:"14px 0" }} />
    <div style=${{ fontSize:11, textTransform:"uppercase", letterSpacing:".06em", color:C.dorado, marginBottom:10 }}>Escena</div>
    <div style=${{ display:"flex", flexDirection:"column", gap:8 }}>
      <${Btn} onClick=${exportJson}>⭳ Exportar escena (JSON)<//>
      <label style=${{ display:"block" }}>
        <span style=${{ display:"block", background:C.panel2, border:`1px solid ${C.border}`, borderRadius:8,
          padding:"8px 12px", fontSize:13, fontWeight:600, cursor:"pointer", textAlign:"center", color:C.text }}>⭱ Importar escena</span>
        <input type="file" accept="application/json" onChange=${importJson} style=${{ display:"none" }} />
      </label>
      <${Btn} danger onClick=${resetAll}>↺ Restablecer a ejemplo<//>
    </div>
    <div style=${{ fontSize:11, color:C.muted, marginTop:16, lineHeight:1.5 }}>
      Todo se guarda automáticamente en este navegador. Exporta el JSON para llevar tu diseño a otro equipo o compartirlo con la oficina.
    </div>
  </div>`;
}

try {
  createRoot(document.getElementById("root")).render(React.createElement(App));
  requestAnimationFrame(() => requestAnimationFrame(() => { _boot.classList.add("hide"); setTimeout(() => _boot.remove(), 550); }));
} catch (err) {
  _boot.innerHTML = '<b style="color:#E8B83E">Error al arrancar</b><span style="max-width:440px;text-align:center">' + (err && err.message ? err.message : err) + '</span>';
  console.error(err);
}
